services:
  db:
    image: postgres:16-alpine
    container_name: serene-guestbook-db
    restart: unless-stopped
    env_file:
      - ${ROOT_ENV_FILE:-./.env.local}
    ports:
      - '5432:5432'
    volumes:
      - guestbook-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    container_name: serene-guestbook-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${API_ENV_FILE:-./api/.env.local}
      - ${ROOT_ENV_FILE:-./.env.local}
    ports:
      - '4000:4000'

volumes:
  guestbook-db-data:
